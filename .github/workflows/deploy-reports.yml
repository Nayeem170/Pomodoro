name: Deploy Reports

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  coverage:
    name: Unit Test Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Install dotnet tools
        run: dotnet tool install --global dotnet-reportgenerator-globaltool

      - name: Run unit tests with coverage
        run: dotnet test --collect:"XPlat Code Coverage" --results-directory ./coverage

      - name: Generate coverage report
        run: reportgenerator "-reports:./coverage/**/coverage.cobertura.xml" "-targetdir:./coverage-report" "-reporttypes:Html"

      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ./coverage-report
          retention-days: 90

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install npm dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Publish Blazor app for e2e
        run: dotnet publish src/Pomodoro.Web -c Release -o ./bin/e2e-publish

      - name: Run e2e tests
        run: npx playwright test --reporter=html --output ./e2e-results

      - uses: actions/upload-artifact@v4
        with:
          name: e2e-report
          path: playwright-report
          retention-days: 90

  pages:
    name: Deploy to GitHub Pages
    needs: [coverage, e2e]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Cleanup old pages artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId
            });
            for (const artifact of artifacts.data.artifacts) {
              if (artifact.name === 'github-pages') {
                await github.rest.actions.deleteArtifact({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  artifact_id: artifact.id
                });
              }
            }

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: ./site/coverage

      - name: Download e2e report
        uses: actions/download-artifact@v4
        with:
          name: e2e-report
          path: ./site/e2e

      - name: Create index page
        run: |
          cat > ./site/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Pomodoro - Reports</title>
            <style>
              body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 700px; margin: 60px auto; padding: 0 20px; background: #1a1a2e; color: #e0e0e0; }
              h1 { color: #fff; }
              a { color: #60a5fa; text-decoration: none; display: block; padding: 16px 20px; margin: 8px 0; border: 1px solid #333; border-radius: 8px; transition: background 0.2s; }
              a:hover { background: #2a2a4e; }
              .label { font-size: 0.85em; color: #888; margin-bottom: 4px; }
              .title { font-size: 1.1em; font-weight: 600; }
            </style>
          </head>
          <body>
            <h1>Pomodoro Reports</h1>
            <div>
              <a href="/Pomodoro/coverage/index.html">
                <div class="label">Unit & Component Tests</div>
                <div class="title">Coverage Report</div>
              </a>
              <a href="/Pomodoro/e2e/index.html">
                <div class="label">E2E Tests</div>
                <div class="title">Playwright Report</div>
              </a>
            </div>
          </body>
          </html>
          EOF

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

      - id: deployment
        uses: actions/deploy-pages@v4
