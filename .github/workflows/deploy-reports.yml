name: Deploy Reports

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  coverage:
    name: Unit Test Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Install dotnet tools
        run: dotnet tool install --global dotnet-reportgenerator-globaltool

      - name: Run unit tests with coverage
        run: dotnet test --collect:"XPlat Code Coverage" --results-directory ./coverage

      - name: Generate coverage report
        run: reportgenerator "-reports:./coverage/**/coverage.cobertura.xml" "-targetdir:./coverage-report" "-reporttypes:Html"

      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ./coverage-report
          retention-days: 90

  build-e2e:
    name: Build E2E App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - uses: actions/setup-node@v4
        with:
          node-version: "18"

      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: dotnet publish src/Pomodoro.Web -c Release -o ./bin/e2e-publish

      - uses: actions/upload-artifact@v4
        with:
          name: e2e-publish
          path: bin/e2e-publish
          retention-days: 1

  e2e-shard-1:
    name: E2E (1/8)
    needs: build-e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
      - run: npx playwright install --with-deps chromium
      - uses: actions/download-artifact@v4
        with:
          name: e2e-publish
          path: bin/e2e-publish
      - run: npm ci
      - run: npx playwright test --shard=1/8 --reporter=html --output ./e2e-results
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-report-shard-1
          path: playwright-report
          retention-days: 90

  e2e-shard-2:
    name: E2E (2/8)
    needs: build-e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
      - run: npx playwright install --with-deps chromium
      - uses: actions/download-artifact@v4
        with:
          name: e2e-publish
          path: bin/e2e-publish
      - run: npm ci
      - run: npx playwright test --shard=2/8 --reporter=html --output ./e2e-results
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-report-shard-2
          path: playwright-report
          retention-days: 90

  e2e-shard-3:
    name: E2E (3/8)
    needs: build-e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
      - run: npx playwright install --with-deps chromium
      - uses: actions/download-artifact@v4
        with:
          name: e2e-publish
          path: bin/e2e-publish
      - run: npm ci
      - run: npx playwright test --shard=3/8 --reporter=html --output ./e2e-results
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-report-shard-3
          path: playwright-report
          retention-days: 90

  e2e-shard-4:
    name: E2E (4/8)
    needs: build-e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
      - run: npx playwright install --with-deps chromium
      - uses: actions/download-artifact@v4
        with:
          name: e2e-publish
          path: bin/e2e-publish
      - run: npm ci
      - run: npx playwright test --shard=4/8 --reporter=html --output ./e2e-results
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-report-shard-4
          path: playwright-report
          retention-days: 90

  e2e-shard-5:
    name: E2E (5/8)
    needs: build-e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
      - run: npx playwright install --with-deps chromium
      - uses: actions/download-artifact@v4
        with:
          name: e2e-publish
          path: bin/e2e-publish
      - run: npm ci
      - run: npx playwright test --shard=5/8 --reporter=html --output ./e2e-results
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-report-shard-5
          path: playwright-report
          retention-days: 90

  e2e-shard-6:
    name: E2E (6/8)
    needs: build-e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
      - run: npx playwright install --with-deps chromium
      - uses: actions/download-artifact@v4
        with:
          name: e2e-publish
          path: bin/e2e-publish
      - run: npm ci
      - run: npx playwright test --shard=6/8 --reporter=html --output ./e2e-results
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-report-shard-6
          path: playwright-report
          retention-days: 90

  e2e-shard-7:
    name: E2E (7/8)
    needs: build-e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
      - run: npx playwright install --with-deps chromium
      - uses: actions/download-artifact@v4
        with:
          name: e2e-publish
          path: bin/e2e-publish
      - run: npm ci
      - run: npx playwright test --shard=7/8 --reporter=html --output ./e2e-results
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-report-shard-7
          path: playwright-report
          retention-days: 90

  e2e-shard-8:
    name: E2E (8/8)
    needs: build-e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
      - run: npx playwright install --with-deps chromium
      - uses: actions/download-artifact@v4
        with:
          name: e2e-publish
          path: bin/e2e-publish
      - run: npm ci
      - run: npx playwright test --shard=8/8 --reporter=html --output ./e2e-results
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-report-shard-8
          path: playwright-report
          retention-days: 90

  merge-e2e-reports:
    name: Merge E2E Reports
    needs: [e2e-shard-1, e2e-shard-2, e2e-shard-3, e2e-shard-4, e2e-shard-5, e2e-shard-6, e2e-shard-7, e2e-shard-8]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
      - uses: actions/download-artifact@v4
        with:
          path: shard-reports
          pattern: e2e-report-shard-*
      - run: npx playwright merge-reports ./shard-reports --reporter=html ./merged-e2e-report
      - uses: actions/upload-artifact@v4
        with:
          name: e2e-report
          path: merged-e2e-report
          retention-days: 90

  pages:
    name: Deploy to GitHub Pages
    needs: [coverage, merge-e2e-reports]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Cleanup stale pages artifacts
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts" \
            --jq '.artifacts[] | select(.name=="github-pages") | .id' \
            | while read -r art_id; do
              echo "Deleting stale artifact $art_id"
              gh api -X DELETE "repos/${{ github.repository }}/actions/artifacts/$art_id" || true
            done

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: ./site/coverage

      - name: Download e2e report
        uses: actions/download-artifact@v4
        with:
          name: e2e-report
          path: ./site/e2e

      - name: Create index page
        run: |
          cat > ./site/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Pomodoro - Reports</title>
            <style>
              body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 700px; margin: 60px auto; padding: 0 20px; background: #1a1a2e; color: #e0e0e0; }
              h1 { color: #fff; }
              a { color: #60a5fa; text-decoration: none; display: block; padding: 16px 20px; margin: 8px 0; border: 1px solid #333; border-radius: 8px; transition: background 0.2s; }
              a:hover { background: #2a2a4e; }
              .label { font-size: 0.85em; color: #888; margin-bottom: 4px; }
              .title { font-size: 1.1em; font-weight: 600; }
            </style>
          </head>
          <body>
            <h1>Pomodoro Reports</h1>
            <div>
              <a href="/Pomodoro/coverage/index.html">
                <div class="label">Unit & Component Tests</div>
                <div class="title">Coverage Report</div>
              </a>
              <a href="/Pomodoro/e2e/index.html">
                <div class="label">E2E Tests</div>
                <div class="title">Playwright Report</div>
              </a>
            </div>
          </body>
          </html>
          EOF

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

      - id: deployment
        uses: actions/deploy-pages@v4
