name: CI
on:
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
          restore-keys: nuget-${{ runner.os }}-

      - run: dotnet restore Pomodoro.sln
      - run: dotnet format Pomodoro.sln --verify-no-changes
      - run: dotnet build Pomodoro.sln --configuration Release --no-restore
      - run: dotnet test Pomodoro.sln --configuration Release --no-restore --verbosity normal
            --collect:"XPlat Code Coverage" --results-directory ./coverage

      - uses: codecov/codecov-action@v4
        with:
          files: ./coverage/**/coverage.cobertura.xml
          fail_ci_if_error: false

  e2e:
    uses: ./.github/workflows/e2e.yml
    with:
      app_source: 'build'
      reporter: 'list'
