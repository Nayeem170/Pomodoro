name: CI
on:
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
          restore-keys: nuget-${{ runner.os }}-

      - run: dotnet restore Pomodoro.sln
      - run: dotnet format Pomodoro.sln --verify-no-changes
      - run: dotnet build Pomodoro.sln --configuration Release --no-restore

      - run: dotnet publish src/Pomodoro.Web -c Release -o ./bin/e2e-publish
      - run: rm -f bin/e2e-publish/wwwroot/_redirects bin/e2e-publish/wwwroot/_headers

      - uses: actions/upload-artifact@v4
        with:
          name: e2e-publish
          path: bin/e2e-publish
          retention-days: 1

  unit-test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
          restore-keys: nuget-${{ runner.os }}-

      - run: dotnet restore Pomodoro.sln
      - run: dotnet test Pomodoro.sln --configuration Release --verbosity normal
            --collect:"XPlat Code Coverage" --results-directory ./coverage

      - name: Check branch coverage
        run: |
          COVERAGE_FILE=$(find ./coverage -name "coverage.cobertura.xml" | head -1)
          if [ -z "$COVERAGE_FILE" ] || [ ! -f "$COVERAGE_FILE" ]; then
            echo "::error::No coverage report found"
            exit 1
          fi
          COVERED=$(grep -oP 'branches-covered="\K[0-9]+' "$COVERAGE_FILE" | head -1)
          TOTAL=$(grep -oP 'branches-valid="\K[0-9]+' "$COVERAGE_FILE" | head -1)
          if [ -z "$COVERED" ] || [ -z "$TOTAL" ] || [ "$TOTAL" -eq 0 ]; then
            echo "::error::Could not parse branch coverage from report"
            exit 1
          fi
          DISPLAY_PERCENT=$(awk "BEGIN {printf \"%.1f\", ($COVERED/$TOTAL)*100}")
          echo "Branch coverage: $COVERED/$TOTAL ($DISPLAY_PERCENT%)"
          THRESHOLD=98.0
          PASS=$(awk "BEGIN {print (($COVERED/$TOTAL)*100 >= $THRESHOLD) ? 1 : 0}")
          if [ "$PASS" -eq 0 ]; then
            echo "::error::Branch coverage ${DISPLAY_PERCENT}% is below threshold ${THRESHOLD}%"
            exit 1
          fi
          echo "Branch coverage meets threshold"

      - uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/**/coverage.cobertura.xml
          fail_ci_if_error: false

  e2e:
    needs: build
    uses: ./.github/workflows/e2e.yml
    with:
      app_source: 'download'
      reporter: 'list'

  e2e-gate:
    needs: e2e
    runs-on: ubuntu-latest
    if: always()
    steps:
      - run: exit 1
        if: needs.e2e.result != 'success'
      - run: echo "All E2E tests passed"

  enforce-issue-link:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      repository-projects: write
    steps:
      - uses: actions/checkout@v4

      - name: Check PR body for issue reference
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BODY=$(gh pr view ${{ github.event.pull_request.number }} --json body --jq '.body')
          if echo "$BODY" | grep -qiP '(closes|fixes|resolves)\s+#\d+'; then
            echo "linked=true" >> $GITHUB_OUTPUT
          else
            echo "linked=false" >> $GITHUB_OUTPUT
          fi

      - name: Fail if no issue linked
        if: steps.check.outputs.linked == 'false'
        run: |
          echo "::error::PR #${{ github.event.pull_request.number }} is not linked to an issue. Add 'Closes #XX', 'Fixes #XX', or 'Resolves #XX' to the PR body."
          exit 1

      - name: Remove PR from project board
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RESULT=$(gh api graphql -f query='
            query($owner: String!, $number: Int!) {
              user(login: $owner) {
                projectV2(number: $number) {
                  id
                  items(first: 100) {
                    nodes {
                      id
                      content {
                        ... on PullRequest { number }
                      }
                    }
                  }
                }
              }
            }
          ' -f owner="${{ github.repository_owner }}" -f number=4)

          PROJECT_ID=$(echo "$RESULT" | jq -r '.data.user.projectV2.id')
          ITEM_IDS=$(echo "$RESULT" | jq -r --arg pr_num "${{ github.event.pull_request.number }}" '.data.user.projectV2.items.nodes[] | select(.content.number == ($pr_num | tonumber)) | .id')

          for ITEM_ID in $ITEM_IDS; do
            gh api graphql -f query='
              mutation($projectId: ID!, $itemId: ID!) {
                deleteProjectV2Item(input: { projectId: $projectId, itemId: $itemId }) {
                  deletedItemId
                }
              }
            ' -f projectId="$PROJECT_ID" -f itemId="$ITEM_ID"
            echo "Removed PR #${{ github.event.pull_request.number }} from project board"
          done
