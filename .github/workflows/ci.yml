name: CI
on:
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
          restore-keys: nuget-${{ runner.os }}-

      - run: dotnet restore Pomodoro.sln
      - run: dotnet format Pomodoro.sln --verify-no-changes
      - run: dotnet build Pomodoro.sln --configuration Release --no-restore

      - run: dotnet publish src/Pomodoro.Web -c Release -o ./bin/e2e-publish
      - run: rm -f bin/e2e-publish/wwwroot/_redirects bin/e2e-publish/wwwroot/_headers

      - uses: actions/upload-artifact@v4
        with:
          name: e2e-publish
          path: bin/e2e-publish
          retention-days: 1

  unit-test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
          restore-keys: nuget-${{ runner.os }}-

      - run: dotnet restore Pomodoro.sln
      - run: dotnet test Pomodoro.sln --configuration Release --verbosity normal
            --collect:"XPlat Code Coverage" --results-directory ./coverage

      - uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/**/coverage.cobertura.xml
          fail_ci_if_error: false

  e2e:
    needs: build
    uses: ./.github/workflows/e2e.yml
    with:
      app_source: 'download'
      reporter: 'list'

  e2e-gate:
    needs: e2e
    runs-on: ubuntu-latest
    if: always()
    steps:
      - run: exit 1
        if: needs.e2e.result != 'success'
      - run: echo "All E2E tests passed"
