name: Pull Request
on:
  pull_request:
    branches: [main, develop]
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - run: dotnet restore Pomodoro.sln
      - run: dotnet build Pomodoro.sln --configuration Release --no-restore
      - run: dotnet test Pomodoro.sln --configuration Release --no-restore --verbosity normal
