name: Deploy
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy as preview'
        required: true
        default: 'develop'

permissions:
  contents: read
  deployments: write

concurrency:
  group: deploy-${{ github.event_name == 'workflow_dispatch' && inputs.branch || github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.branch || github.ref }}

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
          restore-keys: nuget-${{ runner.os }}-

      - run: dotnet restore Pomodoro.sln
      - run: dotnet build Pomodoro.sln --configuration Release --no-restore
      - run: dotnet publish src/Pomodoro.Web -c Release -o ./publish

      - uses: actions/upload-artifact@v4
        with:
          name: publish
          path: publish/wwwroot
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'push' && 'production' || 'preview' }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: publish
          path: publish/wwwroot

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/pages-action@1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: pomodoro
          branch: ${{ github.event_name == 'push' && 'main' || inputs.branch }}
          directory: publish/wwwroot
