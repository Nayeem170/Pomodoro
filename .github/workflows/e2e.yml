name: E2E Tests
on:
  workflow_call:
    inputs:
      app_source:
        description: 'How to get the app: "build" or "download"'
        required: false
        default: 'build'
        type: string
      reporter:
        description: 'Playwright reporter(s)'
        required: false
        default: 'list'
        type: string
      continue_on_error:
        description: 'Continue on test failure'
        required: false
        default: false
        type: boolean
      upload_report:
        description: 'Upload report artifacts'
        required: false
        default: false
        type: boolean

jobs:
  e2e:
    name: E2E (${{ matrix.shardIndex }}/8)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 8
      matrix:
        shardIndex: ["1", "2", "3", "4", "5", "6", "7", "8"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        if: inputs.app_source == 'build'
        with:
          dotnet-version: '9.0.x'

      - uses: ./.github/actions/setup-e2e

      - uses: actions/cache@v4
        id: publish-cache
        if: inputs.app_source == 'build'
        with:
          path: ./bin/e2e-publish
          key: e2e-publish-${{ runner.os }}-${{ hashFiles('src/**', '**/*.csproj') }}
      - run: dotnet publish src/Pomodoro.Web -c Release -o ./bin/e2e-publish
        if: inputs.app_source == 'build' && steps.publish-cache.outputs.cache-hit != 'true'
      - run: rm -f bin/e2e-publish/wwwroot/_redirects bin/e2e-publish/wwwroot/_headers
        if: inputs.app_source == 'build'

      - uses: actions/download-artifact@v4
        if: inputs.app_source == 'download'
        with:
          name: e2e-publish
          path: bin/e2e-publish

      - name: Run E2E tests
        id: tests
        continue-on-error: ${{ inputs.continue_on_error }}
        run: |
          if [ "${{ inputs.continue_on_error }}" = "true" ]; then
            npx playwright test --shard=${{ matrix.shardIndex }}/8 --reporter=${{ inputs.reporter }} 2>&1 | tee test-output.txt
          else
            npx playwright test --shard=${{ matrix.shardIndex }}/8 --reporter=${{ inputs.reporter }}
          fi
        env:
          CI: true
        shell: bash

      - name: Save shard summary
        if: always() && inputs.upload_report
        run: |
          PASSED=$(grep -oP '\d+(?= passed)' test-output.txt | tail -1)
          FAILED=$(grep -oP '\d+(?= failed)' test-output.txt | tail -1)
          SKIPPED=$(grep -oP '\d+(?= skipped)' test-output.txt | tail -1)
          PASSED=${PASSED:-0}; FAILED=${FAILED:-0}; SKIPPED=${SKIPPED:-0}
          TOTAL=$((PASSED + FAILED + SKIPPED))
          echo "{\"shard_name\":\"shard-${{ matrix.shardIndex }}\",\"passed\":$PASSED,\"failed\":$FAILED,\"skipped\":$SKIPPED,\"total\":$TOTAL}" > shard-summary.json

      - uses: actions/upload-artifact@v4
        if: always() && inputs.upload_report
        with:
          name: e2e-report-shard-${{ matrix.shardIndex }}
          path: playwright-report
          retention-days: 90

      - uses: actions/upload-artifact@v4
        if: always() && inputs.upload_report
        with:
          name: e2e-summary-shard-${{ matrix.shardIndex }}
          path: shard-summary.json
          retention-days: 90
