name: Generate Coverage & E2E Reports
on:
  workflow_dispatch:
    inputs:
      run_e2e:
        description: 'Run full E2E suite (17 shards)'
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  pages: write
  id-token: write
  actions: write

concurrency:
  group: reports
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - run: dotnet publish src/Pomodoro.Web -c Release -o ./bin/e2e-publish

      - run: rm -f bin/e2e-publish/wwwroot/_redirects bin/e2e-publish/wwwroot/_headers

      - uses: actions/upload-artifact@v4
        with:
          name: e2e-publish
          path: bin/e2e-publish
          retention-days: 1

  coverage:
    needs: build
    name: Unit Test Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - run: dotnet tool install --global dotnet-reportgenerator-globaltool

      - run: dotnet test --collect:"XPlat Code Coverage" --results-directory ./coverage

      - run: reportgenerator "-reports:./coverage/**/coverage.cobertura.xml" "-targetdir:./coverage-report" "-reporttypes:Html"

      - name: Extract coverage summary
        run: |
          COV_FILE=$(find ./coverage -name "coverage.cobertura.xml" | head -1)
          LINE_RATE=$(grep -oP 'line-rate="\K[^"]+' "$COV_FILE" | head -1)
          BRANCH_RATE=$(grep -oP 'branch-rate="\K[^"]+' "$COV_FILE" | head -1)
          LINE_PCT=$(echo "$LINE_RATE * 100" | bc | xargs printf "%.1f")
          BRANCH_PCT=$(echo "$BRANCH_RATE * 100" | bc | xargs printf "%.1f")
          echo "{\"line_coverage\": $LINE_PCT, \"branch_coverage\": $BRANCH_PCT}" > ./coverage-summary.json

      - uses: codecov/codecov-action@v4
        with:
          files: ./coverage/**/coverage.cobertura.xml
          fail_ci_if_error: false

      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ./coverage-report
          retention-days: 90

      - uses: actions/upload-artifact@v4
        with:
          name: coverage-summary
          path: ./coverage-summary.json
          retention-days: 90

  e2e:
    needs: build
    if: ${{ github.event.inputs.run_e2e == 'true' }}
    uses: ./.github/workflows/e2e.yml
    with:
      app_source: 'download'
      reporter: 'list,html'
      continue_on_error: true
      upload_report: true

  e2e-gate:
    needs: e2e
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.run_e2e == 'true' }}
    steps:
      - run: exit 1
        if: needs.e2e.result != 'success'
      - run: echo "All E2E tests passed"

  pages:
    name: Deploy to GitHub Pages
    needs: [coverage, e2e]
    if: always() && needs.coverage.result == 'success'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Cleanup stale pages artifacts
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts" \
            --jq '.artifacts[] | select(.name=="github-pages") | .id' \
            | while read -r art_id; do
              echo "Deleting stale artifact $art_id"
              gh api -X DELETE "repos/${{ github.repository }}/actions/artifacts/$art_id" || true
            done

      - uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: ./site/coverage

      - uses: actions/download-artifact@v4
        with:
          name: coverage-summary
          path: ./summaries

      - uses: actions/download-artifact@v4
        with:
          pattern: e2e-report-shard-*
          path: ./site/e2e

      - uses: actions/download-artifact@v4
        with:
          pattern: e2e-summary-shard-*
          path: ./e2e-summaries

      - name: Build index page
        run: |
          LINE_COV=$(node -e "const d=require('./summaries/coverage-summary.json');console.log(d.line_coverage)")
          BRANCH_COV=$(node -e "const d=require('./summaries/coverage-summary.json');console.log(d.branch_coverage)")
          BRANCH_CLASS=$(node -e "console.log(${BRANCH_COV} >= 80 ? 'good' : 'warn')")

          TOTAL_PASSED=0
          TOTAL_FAILED=0
          TOTAL_SKIPPED=0
          TOTAL_TESTS=0
          SHARD_LINKS=""

          for f in ./e2e-summaries/e2e-summary-shard-*/shard-summary.json; do
            if [ -f "$f" ]; then
              SHARD_NAME=$(node -e "const d=require('$f');console.log(d.shard_name)")
              SHARD_LABEL=$(node -e "const d=require('$f');console.log(d.shard_name.charAt(0).toUpperCase() + d.shard_name.slice(1))")
              PASSED=$(node -e "const d=require('$f');console.log(d.passed)")
              FAILED=$(node -e "const d=require('$f');console.log(d.failed)")
              SKIPPED=$(node -e "const d=require('$f');console.log(d.skipped)")
              TOTAL_PASSED=$((TOTAL_PASSED + PASSED))
              TOTAL_FAILED=$((TOTAL_FAILED + FAILED))
              TOTAL_SKIPPED=$((TOTAL_SKIPPED + SKIPPED))
              TOTAL_TESTS=$((TOTAL_TESTS + PASSED + FAILED + SKIPPED))

              if [ "$FAILED" -gt 0 ]; then
                STATUS_CLASS="fail"
                STATUS_TEXT="${PASSED}/${PASSED + FAILED} passed"
              else
                STATUS_CLASS="pass"
                STATUS_TEXT="All ${PASSED} passed"
              fi

              SHARD_LINKS="${SHARD_LINKS}
              <a href=\"/Pomodoro/e2e/e2e-report-shard-${SHARD_NAME}/index.html\">
                <div class=\"label\">${SHARD_LABEL}</div>
                <div class=\"title\"><span class=\"${STATUS_CLASS}\">${STATUS_TEXT}</span></div>
              </a>"
            fi
          done

          PASS_CLASS=$(node -e "console.log(${TOTAL_FAILED} === 0 ? 'good' : 'fail')")
          PASS_RATE=$(node -e "console.log(($TOTAL_TESTS > 0 ? (${TOTAL_PASSED}/${TOTAL_TESTS}*100) : 100).toFixed(1))")

          cat > ./site/index.html << HTMLEOF
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Pomodoro - Reports</title>
            <style>
              * { box-sizing: border-box; margin: 0; padding: 0; }
              body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; background: #0f0f1a; color: #e0e0e0; }
              h1 { color: #fff; font-size: 1.75rem; margin-bottom: 24px; text-align: center; }
              .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 32px; }
              .card { background: #1a1a2e; border: 1px solid #2a2a4e; border-radius: 12px; padding: 20px; text-align: center; }
              .card-value { font-size: 2rem; font-weight: 700; margin-bottom: 4px; }
              .card-label { font-size: 0.85rem; color: #888; }
              .good { color: #4ade80; }
              .warn { color: #fb923c; }
              .fail { color: #f87171; }
              .pass { color: #4ade80; }
              .section-title { color: #aaa; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
              .links { display: flex; flex-direction: column; gap: 8px; margin-bottom: 32px; }
              a { color: #60a5fa; text-decoration: none; display: block; padding: 14px 20px; border: 1px solid #2a2a4e; border-radius: 8px; transition: background 0.2s; }
              a:hover { background: #1e1e36; }
              .label { font-size: 0.8rem; color: #666; margin-bottom: 2px; }
              .title { font-size: 1rem; font-weight: 600; color: #e0e0e0; }
              .shards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 8px; }
              .timestamp { text-align: center; color: #555; font-size: 0.8rem; margin-top: 32px; }
            </style>
          </head>
          <body>
            <h1>Pomodoro Reports</h1>

            <div class="summary-grid">
              <div class="card">
                <div class="card-value ${PASS_CLASS}">${TOTAL_PASSED}/${TOTAL_TESTS}</div>
                <div class="card-label">E2E Tests Passed</div>
              </div>
              <div class="card">
                <div class="card-value ${PASS_CLASS}">${PASS_RATE}%</div>
                <div class="card-label">E2E Pass Rate</div>
              </div>
              <div class="card">
                <div class="card-value good">${LINE_COV}%</div>
                <div class="card-label">Line Coverage</div>
              </div>
              <div class="card">
                <div class="card-value ${BRANCH_CLASS}">${BRANCH_COV}%</div>
                <div class="card-label">Branch Coverage</div>
              </div>
            </div>

            <div class="section-title">Detailed Reports</div>
            <div class="links">
              <a href="/Pomodoro/coverage/index.html">
                <div class="label">Unit & Component Tests</div>
                <div class="title">Coverage Report</div>
              </a>
            </div>

            <div class="section-title">E2E Test Shards</div>
            <div class="shards-grid">${SHARD_LINKS}
            </div>

            <div class="timestamp">Generated on $(date -u '+%Y-%m-%d %H:%M UTC')</div>
          </body>
          </html>
          HTMLEOF

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

      - id: deployment
        uses: actions/deploy-pages@v4
