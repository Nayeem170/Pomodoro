name: Dev Build, Test & Deploy

on:
  push:
    branches: [develop]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: deploy-dev
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install npm dependencies
        run: npm ci

      - name: Restore NuGet packages
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Run unit tests
        run: dotnet test tests/Pomodoro.Web.Tests tests/Pomodoro.Web.Tests.Components --configuration Release --no-build --verbosity normal

      - name: Publish Blazor WASM app
        run: dotnet publish src/Pomodoro.Web -c Release -o ./bin/e2e-publish

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: deployment-files
          path: bin/e2e-publish/wwwroot/
          retention-days: 1

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Remove Cloudflare Pages config for e2e
        run: rm -f bin/e2e-publish/wwwroot/_redirects bin/e2e-publish/wwwroot/_headers

      - name: Run e2e tests
        run: npx playwright test --reporter=list
        env:
          CI: true

  deploy:
    name: Deploy to Cloudflare Pages (Preview)
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    environment:
      name: development
      url: ${{ steps.deploy.outputs.deployment-url }}
    steps:
      - name: Download deployment artifact
        uses: actions/download-artifact@v4
        with:
          name: deployment-files
          path: deployment/wwwroot/

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy deployment/wwwroot --project-name=pomodoro --branch=develop
