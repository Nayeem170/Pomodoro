name: Dev Deploy

on:
  push:
    branches: [develop]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: deploy-dev
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build, Test & Deploy
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    environment:
      name: development
      url: ${{ steps.deploy.outputs.deployment-url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore NuGet packages
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Run unit tests
        run: dotnet test Pomodoro.sln --configuration Release --no-build --verbosity normal

      - name: Publish Blazor WASM app
        run: dotnet publish src/Pomodoro.Web -c Release -o ./publish

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/pages-action@1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: pomodoro
          branch: develop
          directory: publish/wwwroot
